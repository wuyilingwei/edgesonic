name = "edgesonic"
main = "src/index.ts"
compatibility_date = "2025-05-24"
compatibility_flags = ["nodejs_compat"]
account_id = "df4481f3ce1fa0394b4617442a97d147"

# Routes — deploy to custom domain
routes = [
  { pattern = "edgesonic.wuyilingwei.com", custom_domain = true }
]

# Instance identity (anti-loop chain marker, docs/DESIGN.md §3.2)
[vars]
INSTANCE_ID = "9b83869d-397a-42b4-af9b-ea11b2a90504"
MAX_PROXY_DEPTH = "3"

# Static Assets (Vue frontend)
[assets]
directory = "../web/dist"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "edgesonic-db"
database_id = "b91ba5a7-08c4-4887-a439-e1d226dcd8e6"

# KV Namespace
[[kv_namespaces]]
binding = "KV"
id = "83b4b384134a4402ba1e7adc26d5539f"

# R2 Bucket
[[r2_buckets]]
binding = "MUSIC_BUCKET"
bucket_name = "edgesonic-music"

[observability]
enabled = true

# ---------------------------------------------------------------------------
# 046 — Podcast Cron Trigger (now 067 — managed via CF API)
# ---------------------------------------------------------------------------
# Cron triggers are managed dynamically through the Cloudflare API. The static
# `[triggers]` block previously declared here is intentionally removed so that
# `wrangler deploy` no longer overwrites schedules configured at runtime via
# /edgesonic/cf/setCron (054) or /edgesonic/cf/ensureDefaultCron (067).
#
# Single source of truth: the Worker's schedules list on Cloudflare.
# Deploy flow:
#   1. `wrangler deploy` (will clear schedules as a side effect)
#   2. Settings → Cloudflare integration → "Ensure default cron"
# See worker/CF_CRON.md for details.
#
# Default schedule that ensureDefaultCron re-applies after a deploy:
#   crons = ["0 */1 * * *"]
# (046 podcast RSS refresh + 051 WebDAV auto-scan + 052 stale work reclaim,
#  all wired in src/index.ts → scheduled())

# ---------------------------------------------------------------------------
# 049 — Transcode engine (Sandbox SDK container)
# ---------------------------------------------------------------------------
# Sandbox SDK requires three bindings working together:
#   1. [[containers]]   — the Docker image and instance shape
#   2. [[durable_objects]] — the Sandbox DO class proxies requests into containers
#   3. [[migrations]]   — needed because Sandbox uses SQLite-backed DO state
#
# Default engine is `disabled` (features.transcode_engine), so this container
# never starts in production until Rosmontis flips the Settings switch.
# TODO Rosmontis 校核：max_instances / instance_type 按实际并发预算调整。

[[containers]]
class_name = "Sandbox"
image = "./transcoder-image/Dockerfile"
instance_type = "lite"          # 0.5 vCPU / 512 MB — covers 128k mp3 in real-time
max_instances = 3               # bound concurrency to control cost

[[durable_objects.bindings]]
class_name = "Sandbox"
name = "Sandbox"

[[migrations]]
tag = "v1-sandbox"
new_sqlite_classes = ["Sandbox"]
