name: Release EdgeSonic (precompiled package)

# Builds a self-contained, ready-to-deploy package and publishes it as a
# GitHub Release asset. Unlike deploy.yml, this workflow needs NO Cloudflare
# credentials — it only builds and packages. Deployment happens later,
# wherever the package is downloaded to, via `wrangler`.
#
# The package contains a prebuilt web/dist and an isolated worker/node_modules
# (worker's own runtime deps only — hono + @cloudflare/sandbox), so consuming
# it never requires `npm ci` / `npm run build:web` again. See
# docs/DEPLOY_BY_AGENT.md for the consumer-side deploy steps.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under (e.g. v1.2.3) — required for manual runs"
        required: true
        type: string

jobs:
  build:
    name: Build & Publish Package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install monorepo dependencies (build tooling)
        run: npm ci

      - name: Build frontend
        run: |
          npm run build:web
          test -s web/dist/build-info.json

      - name: Assemble release package
        run: |
          set -euo pipefail
          # Stage OUTSIDE the repo checkout. This repo is an npm workspaces
          # monorepo, so running `npm install` anywhere under the repo root
          # makes npm walk up, find the root package.json `workspaces`, and
          # hoist the worker's deps into the ROOT node_modules — leaving
          # worker/node_modules empty. Staging under RUNNER_TEMP keeps the
          # install self-contained in edgesonic-release/worker/node_modules,
          # exactly where wrangler's bundler resolves hono / @cloudflare/sandbox.
          STAGE="${RUNNER_TEMP}/edgesonic-release"
          rm -rf "$STAGE" edgesonic-release.tar.gz edgesonic-release.tar.gz.sha256
          mkdir -p "$STAGE/web" "$STAGE/worker"

          cp -r web/dist "$STAGE/web/dist"

          cp -r worker/src "$STAGE/worker/src"
          cp -r worker/migrations "$STAGE/worker/migrations"
          cp -r worker/transcoder-image "$STAGE/worker/transcoder-image"
          cp worker/wrangler.toml.example "$STAGE/worker/"
          cp worker/package.json "$STAGE/worker/"
          cp worker/tsconfig.json "$STAGE/worker/"
          cp worker/SECRETS.md "$STAGE/worker/"
          cp worker/CF_CRON.md "$STAGE/worker/"

          cp docs/DEPLOY_BY_AGENT.md "$STAGE/" 2>/dev/null || true

          # Optional demo-library snapshot. The operator populates
          # demo-library/ at the repo root with the sample songs that should
          # ship to the public demo instance. When present, it's archived as
          # demo-library-snapshot.tar.gz and uploaded as a release asset; the
          # deploy-demo workflow restores it into R2 demo-library/ on each
          # demo deploy. Absent → no snapshot asset, demo starts empty.
          if [ -d demo-library ] && [ -n "$(find demo-library -type f -print -quit)" ]; then
            echo "Bundling demo-library/ snapshot into release..."
            tar czf demo-library-snapshot.tar.gz -C . demo-library
          else
            echo "demo-library/ absent or empty — skipping snapshot asset."
          fi

          # Install the Worker's own runtime deps into the staged dir — not
          # `npm ci` at the repo root, which would also drag in web's build-time
          # deps the deployed Worker never uses.
          #
          # Pin to the EXACT versions the repo's root lockfile resolves, so a
          # given tag always produces the same bytes and ships what CI /
          # deploy.sh actually test with. A bare `npm install` floats
          # `hono@^4.12.22` to the latest caret-compatible version at build time
          # (potentially a new minor) — a versioned release must not do that.
          # (worker/package-lock.json is a stale standalone lock that predates
          # @cloudflare/sandbox, so the root lock is the only trustworthy source.)
          #
          # --legacy-peer-deps: worker/package.json's *dev* deps (wrangler vs
          # @cloudflare/workers-types) have a peer-range conflict; --omit=dev
          # skips installing them, but a fresh resolve still evaluates the tree
          # and would ERESOLVE without this. --no-save keeps the shipped
          # worker/package.json byte-identical to source.
          HONO_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/hono'].version")
          SANDBOX_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@cloudflare/sandbox'].version")
          echo "Pinning worker runtime deps: hono@${HONO_VERSION}, @cloudflare/sandbox@${SANDBOX_VERSION}"
          ( cd "$STAGE/worker" && npm install --omit=dev --legacy-peer-deps --no-audit --no-fund --no-save \
              "hono@${HONO_VERSION}" "@cloudflare/sandbox@${SANDBOX_VERSION}" )
           test -d "$STAGE/worker/node_modules/hono" || { echo "::error::worker runtime deps failed to install into the package"; exit 1; }

           tar czf edgesonic-release.tar.gz -C "$RUNNER_TEMP" edgesonic-release
           sha256sum edgesonic-release.tar.gz > edgesonic-release.tar.gz.sha256

      - name: Generate commit summary
        id: notes
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          {
            echo "Precompiled deploy package (prebuilt web/dist + isolated worker/node_modules — no npm ci / build needed)."
            echo
            echo "## Changes"
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --no-merges --format='- %s' "${PREVIOUS_TAG}..${TAG}"
            else
              echo "- Initial release"
            fi
          } > release-notes.md
          printf 'Generated release notes:\n'
          cat release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          # Idempotent publish: update both notes and assets when a release
          # already exists (workflow re-run, re-pushed tag, or retry).
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — replacing notes and assets."
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --title "EdgeSonic $TAG" \
              --notes-file release-notes.md
            # Upload all assets that exist in this build, --clobber replaces
            # any previous versions on a re-run.
            UPLOAD_ARGS=(--clobber)
            [ -f edgesonic-release.tar.gz ] && UPLOAD_ARGS+=(edgesonic-release.tar.gz)
            [ -f edgesonic-release.tar.gz.sha256 ] && UPLOAD_ARGS+=(edgesonic-release.tar.gz.sha256)
            [ -f demo-library-snapshot.tar.gz ] && UPLOAD_ARGS+=(demo-library-snapshot.tar.gz)
            gh release upload "$TAG" "${UPLOAD_ARGS[@]}" \
              --repo "${{ github.repository }}"
          else
            ASSET_ARGS=(edgesonic-release.tar.gz edgesonic-release.tar.gz.sha256)
            [ -f demo-library-snapshot.tar.gz ] && ASSET_ARGS+=(demo-library-snapshot.tar.gz)
            gh release create "$TAG" \
              "${ASSET_ARGS[@]}" \
              --repo "${{ github.repository }}" \
              --title "EdgeSonic $TAG" \
              --notes-file release-notes.md
          fi
