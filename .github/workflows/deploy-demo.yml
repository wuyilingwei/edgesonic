name: Deploy EdgeSonic Demo

# Deploys a fully isolated demo Worker (edgesonic-demo) that runs with
# DEMO_MODE=1 so all demo guards engage (locked superadmin password,
# disabled dangerous perms, capped upload size).
#
# ALL demo reset responsibility lives in this workflow — the demo Worker
# itself does NOT perform any periodic reset. Each time this workflow
# runs (after every release publish, or manually) it:
#   1. Force-deletes + recreates the demo R2 bucket (wipes every visitor
#      upload / modification / cache entry in one shot).
#   2. Re-uploads the canonical demo library from the repo's
#      demo-library/ directory.
#   3. Re-applies the D1 schema + seeds the demo superadmin.
#   4. Redeploys the Worker.
#
# Resources are auto-provisioned on first run:
#   - Worker script: edgesonic-demo
#   - D1 database:   edgesonic-demo-db
#   - R2 bucket:     edgesonic-demo-music
#
# Credentials come from the same repo secrets the main deploy workflow uses:
#   - secrets.CLOUDFLARE_API_TOKEN
#   - secrets.CLOUDFLARE_ACCOUNT_ID
# Set them once with:
#   gh secret set CLOUDFLARE_API_TOKEN
#   gh secret set CLOUDFLARE_ACCOUNT_ID
#
# Triggers:
#   - Automatically after `Release EdgeSonic` completes successfully
#     (workflow_run) so every published release updates the demo.
#   - Manually via workflow_dispatch (e.g. to redeploy without cutting a new
#     release, or to test demo deploy in isolation).

on:
  workflow_run:
    workflows: ["Release EdgeSonic (precompiled package)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Pin an exact release tag (e.g. v1.2.3). Defaults to the latest stable release.'
        required: false
        default: ''
        type: string
      source_repo:
        description: 'Repo to download the precompiled release package from.'
        required: false
        default: 'wuyilingwei/edgesonic'
        type: string
      demo_max_upload_bytes:
        description: 'Per-upload byte cap (default 52428800 = 50 MiB). Leave empty to read from .github/demo/env.'
        required: false
        default: ''
        type: string
      r2_max_limit:
        description: 'Total R2 storage ceiling in bytes (default 104857600 = 100 MiB). Leave empty to read from .github/demo/env.'
        required: false
        default: ''
        type: string

jobs:
  deploy:
    name: Deploy demo Worker
    runs-on: ubuntu-latest
    # Only run on success of the triggering Release workflow. Manual
    # workflow_dispatch runs skip this gate (github.event_name !== 'workflow_run').
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Assert repo secrets are set
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Missing repo secrets CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID."
            echo "::error::Set them once with:"
            echo "::error::  gh secret set CLOUDFLARE_API_TOKEN"
            echo "::error::  gh secret set CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ secrets.CLOUDFLARE_API_TOKEN }}"
          echo "::add-mask::${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Sparse checkout: only the .github/demo/ subtree is needed for
          # the env defaults + sample library. Keeps the demo deploy fast
          # and avoids dragging the whole repo into the runner.
          sparse-checkout: |
            .github/demo
          # 0 downloads only the commit's tree, not the full history.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install wrangler
        run: npm install -g wrangler@4.94.0

      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          SRC: ${{ github.event.inputs.source_repo || 'wuyilingwei/edgesonic' }}
          PIN: ${{ github.event.inputs.release_tag || '' }}
        run: |
          set -euo pipefail
          if [ -n "$PIN" ]; then
            TAG="$PIN"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # The Release workflow's triggering tag is surfaced via
            # workflow_run.head_branch (e.g. "v1.2.3"). Fall back to the
            # GitHub "latest" release if it's somehow empty.
            TAG="${{ github.event.workflow_run.head_branch }}"
            if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then
              TAG=$(gh release view --repo "$SRC" --json tagName --jq .tagName)
            fi
          else
            TAG=$(gh release view --repo "$SRC" --json tagName --jq .tagName)
          fi
          echo "Deploying demo from release '$TAG' of '$SRC'"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download & extract release package
        env:
          GH_TOKEN: ${{ github.token }}
          SRC: ${{ github.event.inputs.source_repo || 'wuyilingwei/edgesonic' }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          gh release download "$TAG" --repo "$SRC" \
            --pattern 'edgesonic-release.tar.gz' \
            --pattern 'edgesonic-release.tar.gz.sha256'
          sha256sum -c edgesonic-release.tar.gz.sha256
          tar xzf edgesonic-release.tar.gz
          test -d edgesonic-release/worker
          test -d edgesonic-release/web/dist
          test -s edgesonic-release/web/dist/build-info.json

      - name: Provision Cloudflare resources
        id: provision
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          DB_NAME="edgesonic-demo-db"
          R2_NAME="edgesonic-demo-music"

          # D1: replace the whole demo database on every run. Schema.sql uses
          # INSERT OR IGNORE, so merely reapplying it doesn't undo visitors'
          # storage sources, users, feature settings, or library metadata.
          # Recreating D1 gives the demo a real clean baseline each deploy.
          DB_LIST=$(wrangler d1 list --json 2>/dev/null || echo "[]")
          DB_ID=$(echo "$DB_LIST" | jq -r --arg n "$DB_NAME" \
            '.[] | select(.name==$n) | (.uuid // .database_id // "") | select(length>0)' \
            2>/dev/null || echo "")
          if [ -n "$DB_ID" ]; then
            echo "Deleting prior demo D1 database '$DB_NAME'..."
            wrangler d1 delete "$DB_NAME" --skip-confirmation >/dev/null
          fi
          echo "Creating clean D1 database '$DB_NAME'..."
          wrangler d1 create "$DB_NAME" >/dev/null
          DB_ID=$(wrangler d1 list --json | jq -r --arg n "$DB_NAME" \
            '.[] | select(.name==$n) | (.uuid // .database_id)')
          echo "db_id=$DB_ID" >> "$GITHUB_OUTPUT"

          # R2 bucket is force-deleted and recreated in the reupload step
          # below, so we don't create it here. The reupload step handles
          # both deletion and creation atomically.

          # INSTANCE_ID for the demo Worker — random per run so re-deploys
          # rotate the anti-loop marker. uuid4 (pure random) is fine here:
          # the demo Worker doesn't chain S2S so a fresh UUID each deploy is
          # harmless and avoids leaking any stable identifier.
          INST=$(python3 -c 'import uuid; print(str(uuid.uuid4()))')
          echo "inst=$INST" >> "$GITHUB_OUTPUT"

      - name: Generate demo wrangler.toml
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DB_ID:   ${{ steps.provision.outputs.db_id }}
          R2_NAME: edgesonic-demo-music
          INST:    ${{ steps.provision.outputs.inst }}
        run: |
          set -euo pipefail
          # The release package ships worker/wrangler.toml.example. We sed the
          # demo-specific values into it; demo uses <worker>.workers.dev so
          # the routes block is stripped. Worker name is overridden below.
          sed \
            -e "s|<YOUR_CLOUDFLARE_ACCOUNT_ID>|${CF_ACCOUNT_ID}|g" \
            -e "s|<YOUR_D1_DATABASE_ID>|${DB_ID}|g" \
            -e "s|<YOUR_R2_BUCKET_NAME>|${R2_NAME}|g" \
            -e "s|<GENERATE_A_UUID>|${INST}|g" \
            edgesonic-release/worker/wrangler.toml.example > edgesonic-release/worker/wrangler.toml
          # No custom domain — use edgesonic-demo.<account>.workers.dev.
          sed -i '/^routes/,/^\]/d' edgesonic-release/worker/wrangler.toml
          # Rename the Worker script to edgesonic-demo so it's isolated from
          # any production deploy on the same account.
          sed -i 's|^name = "edgesonic"|name = "edgesonic-demo"|' edgesonic-release/worker/wrangler.toml

      - name: Apply DB schema + seed demo superadmin
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          DB_NAME="edgesonic-demo-db"
          # Apply schema (idempotent — every CREATE uses IF NOT EXISTS).
          wrangler d1 execute "$DB_NAME" --remote \
            --config edgesonic-release/worker/wrangler.toml \
            --file edgesonic-release/worker/migrations/Schema.sql

          # Seed the demo superadmin only if the users table is empty. The
          # password hash is sha256("demo") — same convention as the
          # README's first-login bootstrap.
          USER_COUNT=$(wrangler d1 execute "$DB_NAME" --remote \
            --config edgesonic-release/worker/wrangler.toml \
            --command 'SELECT COUNT(*) AS c FROM users' --json \
            | jq -r '.[0].results[0].c')
          if [ "$USER_COUNT" = "0" ]; then
            echo "Seeding demo superadmin (admin / demo)..."
            PASS_HASH=$(node -e 'const c=require("crypto");console.log(c.createHash("sha256").update("demo").digest("hex"))')
            wrangler d1 execute "$DB_NAME" --remote \
              --config edgesonic-release/worker/wrangler.toml \
              --command "INSERT INTO users (username, master_password, level, enabled, created_at, updated_at) VALUES ('admin', '$PASS_HASH', 3, 1, strftime('%s','now'), strftime('%s','now'))" \
              >/dev/null
          else
            echo "users table already has $USER_COUNT row(s) — skipping seed."
          fi

      - name: Load demo env defaults
        id: demoenv
        run: |
          set -euo pipefail
          # .github/demo/env is a simple KEY=VALUE file shipping demo-
          # specific Worker vars. We source it wholesale and emit every
          # KEY=VALUE pair as a single newline-delimited GITHUB_OUTPUT
          # multiline value named `vars`. The Deploy step expands that
          # list into wrangler --var flags without the workflow having
          # to know which keys exist.
          #
          # Workflow_dispatch inputs still override individual keys —
          # they're applied AFTER sourcing so they win.
          VARS_FILE=".github/demo/env"
          if [ ! -f "$VARS_FILE" ]; then
            echo "::notice::$VARS_FILE not found — using built-in defaults."
            # Bare-minimum defaults so a fresh repo still deploys.
            printf 'DEMO_MAX_UPLOAD_BYTES=52428800\nR2_MAX_LIMIT=104857600\nDEFAULT_THEME=\nALLOW_ALL_FILE_TYPES=0\n' > "$VARS_FILE"
          fi
          # Source into the current shell, then re-emit as KEY=VALUE lines
          # (skipping comments / blanks) for the Deploy step to consume.
          # shellcheck disable=SC1090
          set -a; . "$VARS_FILE"; set +a
          # Apply workflow_dispatch overrides (only when the input is
          # non-empty — GitHub leaves unset inputs as the empty string).
          INPUT_MAXUP="${{ github.event.inputs.demo_max_upload_bytes }}"
          INPUT_R2LIMIT="${{ github.event.inputs.r2_max_limit }}"
          [ -n "$INPUT_MAXUP" ] && DEMO_MAX_UPLOAD_BYTES="$INPUT_MAXUP"
          [ -n "$INPUT_R2LIMIT" ] && R2_MAX_LIMIT="$INPUT_R2LIMIT"
          # Build the multiline output: one KEY=VALUE per line.
          {
            [ -n "${DEMO_MAX_UPLOAD_BYTES:-}" ] && echo "DEMO_MAX_UPLOAD_BYTES=$DEMO_MAX_UPLOAD_BYTES"
            [ -n "${R2_MAX_LIMIT:-}" ] && echo "R2_MAX_LIMIT=$R2_MAX_LIMIT"
            [ -n "${DEFAULT_THEME:-}" ] && echo "DEFAULT_THEME=$DEFAULT_THEME"
            [ -n "${ALLOW_ALL_FILE_TYPES:-}" ] && echo "ALLOW_ALL_FILE_TYPES=$ALLOW_ALL_FILE_TYPES"
          } > /tmp/demo-vars.txt
          # GITHUB_OUTPUT multiline via delimiter.
          DELIM="$(uuidgen)"
          echo "vars<<$DELIM" >> "$GITHUB_OUTPUT"
          cat /tmp/demo-vars.txt >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"
          echo "Loaded demo vars:"
          cat /tmp/demo-vars.txt

      - name: Reupload demo-library/ from repo
        id: reupload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          R2_NAME="edgesonic-demo-music"
          ACCOUNT="$CLOUDFLARE_ACCOUNT_ID"
          AUTH="Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          API="https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/r2/buckets"

          # Skip entirely when the repo has no .github/demo/data/ directory.
          if [ ! -d .github/demo/data ] || [ -z "$(find .github/demo/data -type f ! -name '.DS_Store' -print -quit)" ]; then
            echo "::notice::No .github/demo/data/ directory in the repo — skipping reupload. Demo will start with an empty library."
            exit 0
          fi

          # Nuke the entire bucket so every visitor upload / modification
          # is gone. R2 REST API doesn't support force-delete of a non-empty
          # bucket, so we list every object and delete them one by one,
          # then delete the empty bucket, then recreate it. The Cloudflare
          # REST API returns up to 1000 keys per page; paginate until done.
          echo "Emptying $R2_NAME..."
          CURSOR=""
          while :; do
            LIST_URL="$API/$R2_NAME/objects?per_page=1000"
            if [ -n "$CURSOR" ]; then LIST_URL="${LIST_URL}&cursor=${CURSOR}"; fi
            LIST_RESP=$(curl -s -H "$AUTH" "$LIST_URL")
            if ! echo "$LIST_RESP" | jq -e '.success == true' >/dev/null; then
              echo "::error::R2 list failed: $LIST_RESP"
              exit 1
            fi
            KEYS=$(echo "$LIST_RESP" | jq -r '.result[].key // empty')
            if [ -z "$KEYS" ]; then break; fi
            while IFS= read -r KEY; do
              ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$KEY")
              curl -s -X DELETE "$API/$R2_NAME/objects/$ENC" -H "$AUTH" >/dev/null 2>&1 || true
            done <<< "$KEYS"
            TRUNC=$(echo "$LIST_RESP" | jq -r '.result_info.has_more // false')
            if [ "$TRUNC" != "true" ]; then break; fi
            CURSOR=$(echo "$LIST_RESP" | jq -r '.result_info.cursor // empty')
            if [ -z "$CURSOR" ]; then break; fi
          done

          echo "Deleting empty bucket $R2_NAME..."
          DEL=$(curl -s -X DELETE "$API/$R2_NAME" -H "$AUTH")
          if ! echo "$DEL" | jq -e '.success == true or (.errors[0].code == 10006)' >/dev/null; then
            echo "::error::Bucket delete failed: $DEL"
            exit 1
          fi
          echo "Creating $R2_NAME..."
          CREATE=$(curl -s -X POST "$API" -H "$AUTH" -H "Content-Type: application/json" \
            -d "{\"name\":\"$R2_NAME\",\"locationHint\":\"apac\"}")
          if ! echo "$CREATE" | jq -e '.success == true or (.errors[0].code == 10004)' >/dev/null; then
            echo "::error::Bucket create failed: $CREATE"
            exit 1
          fi
          # Give R2 a beat to settle before we start PUTting objects.
          sleep 2

          # Upload every file under .github/demo/data/ from the repo checkout.
          # Repo path .github/demo/data/<path> → R2 key demo-library/<path>.
          # The demo Worker keeps demo-library/ as the whitelisted prefix so
          # the periodic cleanup doesn't touch uploaded demo content.
          COUNT=0
          while IFS= read -r -d '' FILE; do
            # Skip macOS .DS_Store metadata files.
            case "$(basename "$FILE")" in .DS_Store) continue;; esac
            KEY="${FILE#.github/demo/data/}"
            CONTENT_TYPE="$(file --mime-type -b "$FILE")"
            echo "  → $R2_NAME/demo-library/$KEY"
            # R2 object commands otherwise default to the runner's local
            # simulator. Explicit remote mode is required to restore the
            # Cloudflare bucket that the demo Worker is bound to.
            wrangler r2 object put "$R2_NAME/demo-library/$KEY" \
              --remote \
              --config edgesonic-release/worker/wrangler.toml \
              --file "$FILE" \
              --content-type "$CONTENT_TYPE" >/dev/null
            COUNT=$((COUNT + 1))
          done < <(find .github/demo/data -type f -print0)
          echo "::notice::Uploaded $COUNT files into $R2_NAME/demo-library/"
          echo "file_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Deploy demo Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEMO_VARS: ${{ steps.demoenv.outputs.vars }}
        run: |
          set -euo pipefail
          BUILD_INFO=$(cat edgesonic-release/web/dist/build-info.json)
          node -e 'const v=JSON.parse(process.argv[1]); if (!v.version || !v.buildTime || Number.isNaN(Date.parse(v.buildTime))) process.exit(1)' "$BUILD_INFO"
          VERSION=$(node -e 'console.log(JSON.parse(process.argv[1]).version)' "$BUILD_INFO")
          BUILD_TIME=$(node -e 'console.log(JSON.parse(process.argv[1]).buildTime)' "$BUILD_INFO")

          # Build the --var list from .github/demo/env (already merged with
          # workflow_dispatch overrides in the Load step). Every KEY=VALUE
          # line becomes a `--var KEY:VALUE` flag, so adding a new demo env
          # only requires editing .github/demo/env — no workflow change.
          VAR_FLAGS=(
            --var "WORKER_VERSION:${VERSION}"
            --var "EDGESONIC_VERSION:${VERSION}"
            --var "EDGESONIC_BUILD_TIME:${BUILD_TIME}"
            --var "DEMO_MODE:1"
          )
          while IFS= read -r LINE; do
            [ -z "$LINE" ] && continue
            KEY="${LINE%%=*}"
            VAL="${LINE#*=}"
            # Skip empty values (e.g. DEFAULT_THEME= when unset) so we don't
            # inject a bare flag that wrangler rejects.
            [ -z "$VAL" ] && continue
            echo "  + var $KEY=$VAL"
            VAR_FLAGS+=(--var "${KEY}:${VAL}")
          done <<< "$DEMO_VARS"

          echo "Deploying demo Worker edgesonic-demo with ${#VAR_FLAGS[@]} var flags"
          wrangler deploy \
            --config edgesonic-release/worker/wrangler.toml \
            --containers-rollout=none \
            "${VAR_FLAGS[@]}"

      - name: Scan restored R2 demo library
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EXPECTED_FILES: ${{ steps.reupload.outputs.file_count }}
        run: |
          set -euo pipefail
          # Resolve the account's workers.dev subdomain rather than assuming
          # the account id is the hostname. Login with the freshly seeded
          # demo account, then trigger the native R2 scan so the recreated
          # D1 database gets storage_sources / song_instances rows for the
          # files just uploaded to demo-library/.
          SUBDOMAIN=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | jq -r '.result.subdomain // empty')
          if [ -z "$SUBDOMAIN" ]; then
            echo "::error::Could not resolve workers.dev subdomain."
            exit 1
          fi
          BASE="https://edgesonic-demo.${SUBDOMAIN}.workers.dev"
          COOKIE_JAR=$(mktemp)
          trap 'rm -f "$COOKIE_JAR"' EXIT
          # A D1 binding change can briefly reach an edge running the prior
          # Worker version, whose database was deliberately deleted above.
          # Login needs the new binding too, so retry that expected transient
          # error before obtaining the session used for the scan request.
          for _ in $(seq 1 30); do
            LOGIN=$(curl -s -o /tmp/demo-login.json -w '%{http_code}' \
              -c "$COOKIE_JAR" \
              -H "Content-Type: application/json" \
              -X POST "$BASE/edgesonic/auth/login" \
              --data '{"username":"admin","password":"demo"}')
            if [ "$LOGIN" = "200" ]; then break; fi
            if [ "$LOGIN" != "500" ] || ! grep -q 'has been deleted' /tmp/demo-login.json; then
              echo "::error::Demo login failed (HTTP $LOGIN): $(cat /tmp/demo-login.json)"
              exit 1
            fi
            echo "Waiting for the new D1 binding to reach this edge..."
            sleep 3
          done
          if [ "$LOGIN" != "200" ]; then
            echo "::error::Demo login could not reach the new D1 binding: $(cat /tmp/demo-login.json)"
            exit 1
          fi
          # Retry only the same expected binding propagation failure instead
          # of masking authentication or scan errors.
          for _ in $(seq 1 20); do
            START=$(curl -s -o /tmp/demo-scan.xml -w '%{http_code}' \
              -b "$COOKIE_JAR" \
              "$BASE/storage/scan/start?id=r2-local")
            if [ "$START" = "200" ]; then break; fi
            if [ "$START" != "500" ] || ! grep -q 'has been deleted' /tmp/demo-scan.xml; then
              echo "::error::R2 scan start failed (HTTP $START): $(cat /tmp/demo-scan.xml)"
              exit 1
            fi
            echo "Waiting for the new D1 binding to reach this edge..."
            sleep 3
          done
          if [ "$START" != "200" ]; then
            echo "::error::R2 scan could not reach the new D1 binding: $(cat /tmp/demo-scan.xml)"
            exit 1
          fi
          echo "Triggered native R2 scan."
          # Four demo tracks should finish quickly. Poll for at most 90s;
          # deployment itself succeeds even when metadata parsing continues
          # in the browser work queue after the source scan completes.
          for _ in $(seq 1 30); do
            STATUS=$(curl -s -b "$COOKIE_JAR" "$BASE/storage/scan/status")
            if echo "$STATUS" | grep -q 'status="failed"'; then
              echo "::error::R2 scan failed: $STATUS"
              exit 1
            fi
            if ! echo "$STATUS" | grep -q 'scanning="true"'; then
              if [ -n "$EXPECTED_FILES" ] && ! echo "$STATUS" | grep -q "total=\"$EXPECTED_FILES\""; then
                echo "::error::R2 scan found an unexpected number of files: $STATUS"
                exit 1
              fi
              echo "R2 scan finished: $STATUS"
              exit 0
            fi
            sleep 3
          done
          echo "::error::R2 scan did not finish within 90 seconds."
          exit 1

      - name: Post-deploy reminder
        run: |
          echo "::notice::Demo Worker deployed at https://edgesonic-demo.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
          echo "::notice::Login: admin / demo"
          echo "::notice::After first deploy, sign in and open Settings → Cloudflare → 'Ensure default cron' so cron-driven tasks (podcast refresh, scan, guest token reap) run."
