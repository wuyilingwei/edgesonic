name: Deploy EdgeSonic

# Manual-only trigger — no automatic runs on push.
#
# Recommended flow: fork this repo, create a Cloudflare API token, then run this
# workflow from your fork's Actions tab. It deploys a PRECOMPILED release package
# (prebuilt web/dist + isolated worker/node_modules) — it does NOT build from
# source. Pick the `stable` or `prerelease` channel, or pin an exact tag.
#
# All Cloudflare credentials and resource identifiers are supplied as workflow
# inputs each time; the repository itself stores nothing. D1 / KV / R2 are
# auto-created if absent.
on:
  workflow_dispatch:
    inputs:
      cf_api_token:
        description: 'Cloudflare API Token (Workers:Edit + D1:Edit + R2:Edit)'
        required: true
        type: string
      cf_account_id:
        description: 'Cloudflare Account ID'
        required: true
        type: string
      release_channel:
        description: 'Which release to deploy'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - prerelease
      release_tag:
        description: 'Pin an exact release tag (e.g. v1.0.0) — overrides release_channel when set'
        required: false
        default: ''
        type: string
      source_repo:
        description: 'Repo to download the release package from. Leave as-is to pull the upstream release; change it only if your fork publishes its own releases.'
        required: false
        default: 'wuyilingwei/edgesonic'
        type: string
      worker_name:
        description: 'Worker script name (default: edgesonic)'
        required: false
        default: 'edgesonic'
        type: string
      d1_database_name:
        description: 'D1 database name — auto-created if absent (default: edgesonic-db)'
        required: false
        default: 'edgesonic-db'
        type: string
      kv_namespace_name:
        description: 'KV namespace name — auto-created if absent (default: edgesonic-kv)'
        required: false
        default: 'edgesonic-kv'
        type: string
      r2_bucket_name:
        description: 'R2 bucket name — auto-created if absent (default: edgesonic-music)'
        required: false
        default: 'edgesonic-music'
        type: string
      domain:
        description: 'Custom domain e.g. edgesonic.example.com (empty → <worker>.workers.dev)'
        required: false
        default: ''
        type: string
      instance_id:
        description: 'Anti-loop Worker UUID (auto-generated if empty)'
        required: false
        default: ''
        type: string

jobs:
  deploy:
    name: Deploy precompiled release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Mask before any step that could echo the values.
      - name: Mask sensitive inputs
        run: |
          echo "::add-mask::${{ inputs.cf_api_token }}"
          echo "::add-mask::${{ inputs.cf_account_id }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # wrangler is the deploy tool, not part of the app — install it directly
      # instead of `npm ci`-ing the whole monorepo (which would pull in web's
      # build-time deps). The precompiled package below already contains a
      # prebuilt web/dist and worker/node_modules, so nothing gets built here.
      - name: Install wrangler
        run: npm install -g wrangler@4.94.0

      - name: Download & extract release package
        id: pkg
        env:
          GH_TOKEN: ${{ github.token }}
          SRC: ${{ inputs.source_repo }}
          CHANNEL: ${{ inputs.release_channel }}
          PIN: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if [ -n "$PIN" ]; then
            TAG="$PIN"
          elif [ "$CHANNEL" = "prerelease" ]; then
            # Newest release flagged as a prerelease (excluding drafts).
            TAG=$(gh release list --repo "$SRC" --limit 50 \
              --json tagName,isPrerelease,isDraft \
              --jq 'map(select(.isPrerelease and (.isDraft | not)))[0].tagName // ""')
            if [ -z "$TAG" ]; then
              echo "::error::No prerelease found in $SRC"; exit 1
            fi
          else
            # stable = GitHub "latest" (newest non-prerelease, non-draft).
            TAG=$(gh release view --repo "$SRC" --json tagName --jq .tagName)
          fi

          echo "Deploying release '$TAG' from '$SRC'"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          gh release download "$TAG" --repo "$SRC" \
            --pattern 'edgesonic-release.tar.gz' \
            --pattern 'edgesonic-release.tar.gz.sha256'
          sha256sum -c edgesonic-release.tar.gz.sha256
          tar xzf edgesonic-release.tar.gz
          test -d edgesonic-release/worker
          test -d edgesonic-release/web/dist
          test -s edgesonic-release/web/dist/build-info.json

      - name: Provision Cloudflare resources
        id: provision
        env:
          CLOUDFLARE_API_TOKEN:  ${{ inputs.cf_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cf_account_id }}
          DB_NAME: ${{ inputs.d1_database_name }}
          KV_NAME: ${{ inputs.kv_namespace_name }}
          R2_NAME: ${{ inputs.r2_bucket_name }}
        run: |
          set -euo pipefail

          # D1: get or create
          DB_LIST=$(wrangler d1 list --json 2>/dev/null || echo "[]")
          DB_ID=$(echo "$DB_LIST" | jq -r --arg n "$DB_NAME" \
            '.[] | select(.name==$n) | (.uuid // .database_id // "") | select(length>0)' \
            2>/dev/null || echo "")
          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database '$DB_NAME'..."
            wrangler d1 create "$DB_NAME"
            DB_ID=$(wrangler d1 list --json | jq -r --arg n "$DB_NAME" \
              '.[] | select(.name==$n) | (.uuid // .database_id)')
          fi
          echo "db_id=$DB_ID" >> "$GITHUB_OUTPUT"

          # KV: get or create
          KV_LIST=$(wrangler kv namespace list --json 2>/dev/null || echo "[]")
          KV_ID=$(echo "$KV_LIST" | jq -r --arg t "$KV_NAME" \
            '.[] | select(.title==$t) | .id | select(length>0)' \
            2>/dev/null || echo "")
          if [ -z "$KV_ID" ]; then
            echo "Creating KV namespace '$KV_NAME'..."
            wrangler kv namespace create "$KV_NAME"
            KV_ID=$(wrangler kv namespace list --json | jq -r --arg t "$KV_NAME" \
              '.[] | select(.title==$t) | .id')
          fi
          echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"

          # R2: create bucket if missing
          R2_LIST=$(wrangler r2 bucket list --json 2>/dev/null || echo "[]")
          R2_EXISTS=$(echo "$R2_LIST" | jq -r --arg n "$R2_NAME" \
            '.[] | select(.name==$n) | .name' 2>/dev/null || echo "")
          if [ -z "$R2_EXISTS" ]; then
            echo "Creating R2 bucket '$R2_NAME'..."
            wrangler r2 bucket create "$R2_NAME"
          fi

          # Instance ID: use provided or generate
          INST="${{ inputs.instance_id }}"
          if [ -z "$INST" ]; then
            INST=$(uuidgen | tr '[:upper:]' '[:lower:]')
            echo "Generated INSTANCE_ID: $INST"
          fi
          echo "inst=$INST" >> "$GITHUB_OUTPUT"

      - name: Generate wrangler.toml
        env:
          CF_ACCOUNT_ID: ${{ inputs.cf_account_id }}
          DB_ID:   ${{ steps.provision.outputs.db_id }}
          KV_ID:   ${{ steps.provision.outputs.kv_id }}
          R2_NAME: ${{ inputs.r2_bucket_name }}
          INST:    ${{ steps.provision.outputs.inst }}
          DOMAIN:  ${{ inputs.domain }}
          WORKER:  ${{ inputs.worker_name }}
        run: |
          set -euo pipefail
          sed \
            -e "s|<YOUR_CLOUDFLARE_ACCOUNT_ID>|${CF_ACCOUNT_ID}|g" \
            -e "s|<YOUR_D1_DATABASE_ID>|${DB_ID}|g" \
            -e "s|<YOUR_KV_NAMESPACE_ID>|${KV_ID}|g" \
            -e "s|<YOUR_R2_BUCKET_NAME>|${R2_NAME}|g" \
            -e "s|<GENERATE_A_UUID>|${INST}|g" \
            -e "s|<your-domain.example.com>|${DOMAIN}|g" \
            -e "s|^name = \"edgesonic\"|name = \"${WORKER}\"|" \
            edgesonic-release/worker/wrangler.toml.example > edgesonic-release/worker/wrangler.toml

          # No custom domain → remove routes block; worker uses <name>.workers.dev
          if [ -z "$DOMAIN" ]; then
            sed -i '/^routes/,/^\]/d' edgesonic-release/worker/wrangler.toml
          fi

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ inputs.cf_api_token }}
        run: |
          BUILD_INFO=$(cat edgesonic-release/web/dist/build-info.json)
          node -e 'const v=JSON.parse(process.argv[1]); if (!v.version || !v.buildTime || Number.isNaN(Date.parse(v.buildTime))) process.exit(1)' "$BUILD_INFO"
          VERSION=$(node -e 'console.log(JSON.parse(process.argv[1]).version)' "$BUILD_INFO")
          BUILD_TIME=$(node -e 'console.log(JSON.parse(process.argv[1]).buildTime)' "$BUILD_INFO")
          # [assets] directory = "../web/dist" resolves relative to the config
          # file, i.e. edgesonic-release/web/dist — the prebuilt frontend.
          wrangler deploy \
            --config edgesonic-release/worker/wrangler.toml \
            --containers-rollout=none \
            --var WORKER_VERSION:"${VERSION}" \
            --var EDGESONIC_VERSION:"${VERSION}" \
            --var EDGESONIC_BUILD_TIME:"${BUILD_TIME}"

      - name: Restore cron schedule
        env:
          CLOUDFLARE_API_TOKEN: ${{ inputs.cf_api_token }}
          CF_ACCOUNT_ID: ${{ inputs.cf_account_id }}
          WORKER_NAME: ${{ inputs.worker_name }}
        run: |
          # wrangler deploy clears all cron triggers — PUT the default back immediately.
          CRON_EXPR="0 */1 * * *"
          CF_RESP=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/schedules" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-raw "[{\"cron\":\"${CRON_EXPR}\"}]")
          if node -e 'let body=""; process.stdin.on("data", (chunk) => body += chunk); process.stdin.on("end", () => { try { process.exit(JSON.parse(body).success ? 0 : 1); } catch { process.exit(1); } });' <<<"$CF_RESP"; then
            echo "Cron restored: ${CRON_EXPR}"
          else
            echo "::error::Cron restore failed"
            echo "$CF_RESP" | cut -c1-400
            exit 1
          fi
