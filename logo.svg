<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="discGrad" cx="35%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="45%" stop-color="#FBAD41"/>
      <stop offset="100%" stop-color="#E8720B"/>
    </radialGradient>
  </defs>

  <!-- 主碟片(vinyl/CD) -->
  <circle cx="128" cy="128" r="90" fill="url(#discGrad)" stroke="#0C1E3E" stroke-width="3"/>

  <!-- 碟纹凹槽 -->
  <circle cx="128" cy="128" r="79" fill="none" stroke="#E8720B" stroke-width="1.4" opacity="0.55"/>
  <circle cx="128" cy="128" r="67" fill="none" stroke="#E8720B" stroke-width="1.4" opacity="0.55"/>

  <!-- 中心唱片标签,空心白色圆环 -->
  <circle cx="128" cy="128" r="52" fill="#FFFFFF" stroke="#0C1E3E" stroke-width="2"/>

  <!-- 中心结构:白色底 + 橙黄三角面构成的网,代表多源汇聚与代理路由拓扑 -->
  <circle cx="128" cy="128" r="52" fill="#FFFFFF" stroke="#F38020" stroke-width="2"/>

  <g transform="translate(128 128) scale(1.5) translate(-128 -128)" stroke="#FFFFFF" stroke-width="1.4" stroke-linejoin="round">
    <polygon points="128,128 128,102 150.52,115" fill="#F38020"/>
    <polygon points="128,128 150.52,115 150.52,141" fill="#FBAD41"/>
    <polygon points="128,128 150.52,141 128,154" fill="#F38020"/>
    <polygon points="128,128 128,154 105.48,141" fill="#FBAD41"/>
    <polygon points="128,128 105.48,141 105.48,115" fill="#F38020"/>
    <polygon points="128,128 105.48,115 128,102" fill="#FBAD41"/>
  </g>

  <!-- 外圈六个顶点小点 -->
  <g transform="translate(128 128) scale(1.5) translate(-128 -128)" fill="#F38020">
    <circle cx="128" cy="102" r="2.4"/>
    <circle cx="150.52" cy="115" r="2.4"/>
    <circle cx="150.52" cy="141" r="2.4"/>
    <circle cx="128" cy="154" r="2.4"/>
    <circle cx="105.48" cy="141" r="2.4"/>
    <circle cx="105.48" cy="115" r="2.4"/>
  </g>

  <!-- 焦点:加粗中心点 -->
  <circle cx="128" cy="128" r="5" fill="#FFFFFF" stroke="#F38020" stroke-width="2.8"/>
</svg>
